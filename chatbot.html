<!DOCTYPE html>
<html>
<head>
    <title>AI Chatbot</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial; background: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .container { background: white; width: 500px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); overflow: hidden; }
        .header { background: #4285f4; color: white; padding: 16px; text-align: center; font-size: 18px; font-weight: bold; }
        #chat { height: 450px; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 10px; }
        .message { max-width: 80%; padding: 10px 14px; border-radius: 18px; font-size: 14px; line-height: 1.5; }
        .user { background: #4285f4; color: white; align-self: flex-end; border-bottom-right-radius: 4px; }
        .bot { background: #f1f3f4; color: #333; align-self: flex-start; border-bottom-left-radius: 4px; }
        .input-area { display: flex; padding: 12px; border-top: 1px solid #eee; gap: 8px; }
        input { flex: 1; padding: 10px 14px; border: 1px solid #ddd; border-radius: 24px; outline: none; font-size: 14px; }
        button { background: #4285f4; color: white; border: none; padding: 10px 20px; border-radius: 24px; cursor: pointer; font-size: 14px; }
        button:hover { background: #3367d6; }
        .typing { color: #999; font-style: italic; font-size: 13px; }
        .api-bar { display: flex; padding: 10px 12px; border-bottom: 1px solid #eee; gap: 8px; }
        .api-bar input { flex: 1; padding: 8px 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 13px; outline: none; }
        .api-bar button { padding: 8px 14px; font-size: 13px; border-radius: 8px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">🤖 AI Assistant</div>
        <div class="api-bar">
            <input id="apiKey" type="password" placeholder="Paste your Gemini API key here..." />
            <button onclick="saveKey()">Save</button>
        </div>
        <div id="chat"></div>
        <div class="input-area">
            <input id="input" placeholder="Ask me anything..." onkeypress="if(event.key==='Enter')send()" />
            <button onclick="send()">Send</button>
        </div>
    </div>

    <script>
        let apiKey = '';
        let history = [];

        function saveKey() {
            apiKey = document.getElementById('apiKey').value.trim();
            if (apiKey) addMessage('bot', '✅ API key saved! Ask me anything.');
        }

        function addMessage(role, text) {
            const chat = document.getElementById('chat');
            const div = document.createElement('div');
            div.className = `message ${role}`;
            div.textContent = text;
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
            return div;
        }

        async function send() {
            const input = document.getElementById('input');
            const msg = input.value.trim();
            if (!msg) return;
            if (!apiKey) { addMessage('bot', '⚠️ Please enter your Gemini API key first.'); return; }

            input.value = '';
            addMessage('user', msg);
            const typing = addMessage('bot', 'Typing...');
            typing.className = 'message bot typing';

            history.push({ role: 'user', parts: [{ text: msg }] });

            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: history })
                });
                const data = await res.json();
                const reply = data.candidates?.[0]?.content?.parts?.[0]?.text || 'Sorry, I could not get a response.';
                history.push({ role: 'model', parts: [{ text: reply }] });
                typing.textContent = reply;
                typing.className = 'message bot';
            } catch (e) {
                typing.textContent = 'Error: Could not connect. Check your API key.';
            }
        }

        addMessage('bot', 'Hi! Enter your Gemini API key above to get started. Get a free key at aistudio.google.com/apikey');
    </script>
</body>
</html>
