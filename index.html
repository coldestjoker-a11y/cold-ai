<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cold AI — Chat</title>
  <meta name="description"
    content="Cold AI — intelligent chatbot powered by Claude & Gemini. Ask anything and get instant answers.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="app-wrapper">
    <!-- Animated background orbs -->
    <div class="bg-orb bg-orb-1"></div>
    <div class="bg-orb bg-orb-2"></div>
    <div class="bg-orb bg-orb-3"></div>

    <!-- ── Sidebar ── -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <button class="new-chat-btn" id="newChatBtn" title="New conversation">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
            stroke-linecap="round" stroke-linejoin="round">
            <line x1="12" y1="5" x2="12" y2="19" />
            <line x1="5" y1="12" x2="19" y2="12" />
          </svg>
          New Chat
        </button>
        <button class="sidebar-toggle-btn" id="sidebarToggleBtn" title="Close sidebar">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="18" height="18" rx="2" />
            <line x1="9" y1="3" x2="9" y2="21" />
          </svg>
        </button>
      </div>

      <div class="sidebar-search">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8" />
          <line x1="21" y1="21" x2="16.65" y2="16.65" />
        </svg>
        <input type="text" id="historySearch" placeholder="Search conversations…" autocomplete="off">
      </div>

      <div class="sidebar-list" id="historyList">
        <div class="sidebar-empty" id="historyEmpty">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"
            stroke-linecap="round" stroke-linejoin="round" style="opacity:0.3;margin-bottom:8px">
            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" />
          </svg>
          <span>No conversations yet</span>
        </div>
      </div>

      <div class="sidebar-footer">
        <button class="clear-all-btn" id="clearAllBtn" title="Delete all history">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <polyline points="3 6 5 6 21 6" />
            <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2" />
          </svg>
          Clear all history
        </button>
      </div>
    </aside>

    <!-- ── Main chat area ── -->
    <div class="main-area" id="mainArea">
      <div class="chat-container" id="chatContainer">
        <!-- Header -->
        <div class="chat-header">
          <div class="header-left">
            <!-- Sidebar open button (shown when sidebar is hidden) -->
            <button class="sidebar-open-btn" id="sidebarOpenBtn" title="Open chat history">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="3" width="18" height="18" rx="2" />
                <line x1="9" y1="3" x2="9" y2="21" />
              </svg>
            </button>
            <div class="avatar-pulse" id="avatarPulse">
              <div class="avatar">
                <img src="1764824368660.jpg" alt="Cold AI" class="avatar-img">
              </div>
            </div>
            <div class="header-info">
              <h1 id="providerTitle">Cold AI</h1>
              <span class="status-badge" id="statusBadge">
                <span class="status-dot"></span>
                Online
              </span>
            </div>
          </div>
          <!-- Provider Toggle -->
          <div class="provider-toggle" id="providerToggle" title="Switch AI provider">
            <button class="provider-btn active" data-provider="gemini" id="geminiProviderBtn">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                stroke-linecap="round" stroke-linejoin="round">
                <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2" />
              </svg>
              Gemini
            </button>
            <button class="provider-btn" data-provider="claude" id="claudeProviderBtn">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="10" />
                <path d="M8 12l2 2 4-4" />
              </svg>
              Claude
            </button>
          </div>

          <!-- Mode Toggle -->
          <div class="mode-toggle" id="modeToggle" title="Switch response mode">
            <button class="mode-btn active" data-mode="quick" id="quickModeBtn">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                stroke-linecap="round" stroke-linejoin="round">
                <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2" />
              </svg>
              Quick
            </button>
            <button class="mode-btn" data-mode="deep" id="deepModeBtn">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="10" />
                <path d="M12 16v-4" />
                <path d="M12 8h.01" />
              </svg>
              Deep
            </button>
          </div>

          <button class="clear-btn" id="clearBtn" title="Clear current chat">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round">
              <polyline points="3 6 5 6 21 6" />
              <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2" />
            </svg>
          </button>
        </div>

        <!-- Messages -->
        <div class="chat-messages" id="chatMessages">
          <div class="welcome-card" id="welcomeCard">
            <div class="welcome-icon"><img src="1764824368660.jpg" alt="Cold AI" class="welcome-avatar"></div>
            <h2>Welcome to Cold AI</h2>
            <p>Your intelligent assistant powered by <strong>Gemini</strong> &amp; <strong>Claude</strong>. I can help with coding, math, science, writing, business, and much more.</p>
            <div class="suggestion-chips">
              <button class="chip" data-msg="Write a Python function to sort a list of dictionaries by a specific key">🐍 Python help</button>
              <button class="chip" data-msg="Explain quantum computing in simple terms">🔬 Quantum computing</button>
              <button class="chip" data-msg="Help me write a professional email to a client about a project delay">✉️ Write an email</button>
              <button class="chip" data-msg="What's the difference between SQL and NoSQL databases?">🗄️ SQL vs NoSQL</button>
              <button class="chip" data-msg="Create a workout plan for beginners">💪 Workout plan</button>
              <button class="chip" data-msg="Explain the theory of relativity like I'm 10">🌌 Relativity</button>
            </div>
          </div>
        </div>

        <!-- Input -->
        <div class="chat-input-area">
          <div class="input-wrapper">
            <textarea id="userInput" placeholder="Type your message…" rows="1" maxlength="4000"></textarea>
            <button id="sendBtn" title="Send message">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <line x1="22" y1="2" x2="11" y2="13" />
                <polygon points="22 2 15 22 11 13 2 9 22 2" />
              </svg>
            </button>
          </div>
          <span class="input-hint">Press Enter to send · Shift+Enter for new line</span>
        </div>
      </div>
    </div>
  </div>

  <!-- Rename modal -->
  <div class="modal-overlay" id="renameModal">
    <div class="modal">
      <h3>Rename conversation</h3>
      <input type="text" id="renameInput" placeholder="Enter new title…" maxlength="80">
      <div class="modal-actions">
        <button class="modal-cancel" id="renameCancelBtn">Cancel</button>
        <button class="modal-confirm" id="renameConfirmBtn">Rename</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>

</html>
